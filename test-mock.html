    <!-- Мокаем chrome.storage для тестов -->
    <script>
        window.chrome = {
            storage: {
                local: {
                    _data: {
                        blacklistedCountries: ['США']
                    },
                    get: function(keys, cb) {
                        if (Array.isArray(keys)) {
                            let result = {};
                            keys.forEach(k => {
                                if (this._data[k] !== undefined) {
                                    result[k] = this._data[k];
                                }
                            });
                            cb(result);
                        } else {
                            cb(this._data);
                        }
                    },
                    set: function(data, cb) {
                        Object.assign(this._data, data);
                        if (cb) cb();
                    }
                }
            }
        };
    </script>
